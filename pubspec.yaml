name: blood_link_app
description: "blood donation app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"   # ⚠️ change karanna (3.10.4 ehema stable na)

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.0.3
  firebase_storage: ^12.1.1

  # Networking
  http: ^1.2.0

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Utils
  url_launcher: ^6.3.0
  intl: ^0.19.0   # ⚠️ update krnna hoda

  # Media
  image_picker: ^1.1.2
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  share_plus: ^9.0.0

  # State management
  provider: ^6.1.2

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # QR & Scanner
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/